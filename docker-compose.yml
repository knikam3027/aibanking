services:
  server:
    build: ./server
    container_name: banking-server
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - path: ./server/.env
        required: false
    environment:
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      - ai-service

  ai-service:
    build: ./ai-service
    container_name: banking-ai
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - path: ./ai-service/.env
        required: false

  client:
    build: ./client
    container_name: banking-client
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - server
