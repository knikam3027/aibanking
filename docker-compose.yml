services:
  server:
    build: ./server
    container_name: banking-server
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - path: ./server/.env
        required: false
    environment:
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      - ai-service

  ai-service:
    build: ./ai-service
    container_name: banking-ai
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - path: ./ai-service/.env
        required: false
    environment:
      - AWS_REGION=${AWS_REGION:-us-west-2}
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID:-anthropic.claude-3-sonnet-20240229-v1:0}

  client:
    build: ./client
    container_name: banking-client
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot
    depends_on:
      - server

  certbot:
    image: certbot/certbot
    container_name: banking-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  certbot-etc:
  certbot-var:
  certbot-webroot:
